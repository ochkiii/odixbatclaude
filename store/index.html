<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Store — Odixbat</title>
<meta name="description" content="Digital products — LUT packs, presets and resources from Odixbat.">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#040404;--ink:#f0ece2;--mute:rgba(240,236,226,.35);--border:rgba(240,236,226,.07);
  --cyan:#00c9b1;--yellow:#e8c840;
  --disp:'Bebas Neue',sans-serif;--mono:'Space Mono',monospace;--body:'Inter',system-ui,sans-serif;
}
html{background:var(--bg);color:var(--ink);font-family:var(--body);font-size:14px}
body{min-height:100vh}

nav{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 2.5rem;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(4,4,4,.96);backdrop-filter:blur(12px);z-index:10}
.nav-logo{font-family:var(--disp);font-size:1.1rem;letter-spacing:.18em;text-decoration:none;color:var(--ink)}
.nav-links{display:flex;gap:2rem}
.nav-links a{font-family:var(--mono);font-size:.52rem;letter-spacing:.12em;text-transform:uppercase;text-decoration:none;color:var(--mute);transition:color .15s}
.nav-links a:hover,.nav-links a.active{color:var(--ink)}

.page-hd{padding:3.5rem 2.5rem 2rem;border-bottom:1px solid var(--border)}
.page-eyebrow{font-family:var(--mono);font-size:.52rem;letter-spacing:.2em;text-transform:uppercase;color:var(--mute);margin-bottom:.75rem}
.page-title{font-family:var(--disp);font-size:clamp(2.5rem,6vw,4.5rem);letter-spacing:.04em;line-height:.95;color:var(--ink)}

.products{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1px;background:var(--border);margin:1px}
.product-card{background:var(--bg);display:flex;flex-direction:column}
.product-cover{aspect-ratio:4/3;overflow:hidden;background:#0a0a0a;position:relative}
.product-cover img{width:100%;height:100%;object-fit:cover;filter:grayscale(1) contrast(1.1)}
.product-cover-empty{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:.5rem;color:rgba(240,236,226,.1);letter-spacing:.1em;text-transform:uppercase}
.product-body{padding:1.5rem;flex:1;display:flex;flex-direction:column}
.product-name{font-family:var(--disp);font-size:1.4rem;letter-spacing:.04em;color:var(--ink);line-height:1;margin-bottom:.6rem}
.product-desc{font-family:var(--body);font-size:.8rem;color:rgba(240,236,226,.5);line-height:1.7;margin-bottom:1.25rem;flex:1}
.product-features{margin-bottom:1.25rem}
.product-feature{font-family:var(--mono);font-size:.48rem;color:rgba(240,236,226,.5);letter-spacing:.04em;padding:.25rem 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.5rem}
.product-feature::before{content:'✓';color:var(--cyan);font-size:.6rem;flex-shrink:0}
.product-footer{display:flex;align-items:center;justify-content:space-between;margin-top:auto}
.product-price{font-family:var(--disp);font-size:2rem;letter-spacing:.04em;color:var(--ink)}
.product-price sub{font-family:var(--mono);font-size:.5rem;letter-spacing:.06em;color:var(--mute);vertical-align:bottom;margin-left:.25rem}
.btn-buy{
  font-family:var(--mono);font-size:.55rem;letter-spacing:.12em;text-transform:uppercase;font-weight:700;
  background:var(--cyan);color:var(--bg);border:none;cursor:pointer;
  padding:.65rem 1.25rem;transition:background .15s;
}
.btn-buy:hover{background:rgba(0,201,177,.85)}
.btn-buy:disabled{background:rgba(240,236,226,.08);color:var(--mute);cursor:default}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:40vh;text-align:center;padding:4rem 2rem}
.empty-num{font-family:var(--disp);font-size:6rem;line-height:1;color:rgba(240,236,226,.04);margin-bottom:.5rem}
.empty-txt{font-family:var(--mono);font-size:.55rem;color:var(--mute);letter-spacing:.1em;text-transform:uppercase;line-height:2}

footer{border-top:1px solid var(--border);padding:2rem 2.5rem;display:flex;align-items:center;justify-content:space-between;margin-top:4rem}
.ft-logo{font-family:var(--disp);font-size:.9rem;letter-spacing:.18em;color:var(--mute)}
.ft-links{display:flex;gap:1.5rem}
.ft-links a{font-family:var(--mono);font-size:.48rem;letter-spacing:.1em;text-transform:uppercase;text-decoration:none;color:var(--mute);transition:color .15s}
.ft-links a:hover{color:var(--ink)}

@media(max-width:600px){nav{padding:1rem 1.25rem}.page-hd{padding:2.5rem 1.25rem 1.5rem}}
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">ODIXBAT</a>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/portfolio">Portfolio</a>
    <a href="/tools">Tools</a>
    <a href="/store" class="active">Store</a>
  </div>
</nav>

<div class="page-hd">
  <div class="page-eyebrow">Digital products</div>
  <div class="page-title">STORE</div>
</div>

<div id="products" class="products"></div>
<div id="empty" class="empty" style="display:none">
  <div class="empty-num">0</div>
  <div class="empty-txt">No products yet<br>Check back soon</div>
</div>

<footer>
  <div class="ft-logo">ODIXBAT</div>
  <div class="ft-links">
    <a href="https://instagram.com/odixbat" target="_blank">Instagram</a>
    <a href="/odixprintlab">Print Lab</a>
    <a href="/tools">Tools</a>
  </div>
</footer>

<script>
fetch('/api/store')
  .then(function(r){ return r.json(); })
  .then(function(data){
    var products = Array.isArray(data) ? data : [];
    var container = document.getElementById('products');
    if (!products.length) {
      container.style.display = 'none';
      document.getElementById('empty').style.display = 'flex';
      return;
    }
    container.innerHTML = products.map(function(p) {
      var cover = p.image
        ? '<img src="'+esc(p.image)+'" alt="'+esc(p.name)+'" loading="lazy">'
        : '<div class="product-cover-empty">No image</div>';
      var features = (p.features||[]).slice(0,5).map(function(f){
        return '<div class="product-feature">'+esc(f)+'</div>';
      }).join('');
      return '<div class="product-card">'
        + '<div class="product-cover">'+cover+'</div>'
        + '<div class="product-body">'
        + '<div class="product-name">'+esc(p.name||'')+'</div>'
        + '<div class="product-desc">'+esc(p.description||'')+'</div>'
        + (features ? '<div class="product-features">'+features+'</div>' : '')
        + '<div class="product-footer">'
        + '<div class="product-price">$'+esc(String(p.price||0))+' <sub>USD</sub></div>'
        + '<button class="btn-buy" onclick="buy(\''+esc(p.stripeId||'')+'\',\''+esc(p.name||'')+'\')">Buy Now</button>'
        + '</div>'
        + '</div></div>';
    }).join('');
  })
  .catch(function(){
    document.getElementById('products').style.display = 'none';
    document.getElementById('empty').style.display = 'flex';
  });

function buy(stripeId, name) {
  if (!stripeId) { alert('Product not configured for checkout yet.'); return; }
  var btn = event.target;
  btn.disabled = true;
  btn.textContent = 'Redirecting...';
  fetch('/api/checkout', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ stripeId: stripeId, name: name })
  })
  .then(function(r){ return r.json(); })
  .then(function(j){
    if (j.url) { location.href = j.url; }
    else { alert(j.error || 'Checkout error'); btn.disabled = false; btn.textContent = 'Buy Now'; }
  })
  .catch(function(){ alert('Checkout failed. Please try again.'); btn.disabled = false; btn.textContent = 'Buy Now'; });
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>
