[build]
  publish = "."

# ── Functions ─────────────────────────────────────────────────────
[functions]
  directory    = "netlify/functions"
  node_bundler = "esbuild"

# ═════════════════════════════════════════════════════════════════
# REDIRECTS
# Netlify serves static files directly. Redirects only needed
# for clean URLs and short links. NO catch-all /* — that was
# intercepting the homepage and returning it as a 404.
# ═════════════════════════════════════════════════════════════════

# Homepage — explicit passthrough
[[redirects]]
  from   = "/"
  to     = "/index.html"
  status = 200

# ODX Print Lab
[[redirects]]
  from   = "/odixprintlab"
  to     = "/odixprintlab/index.html"
  status = 200

[[redirects]]
  from   = "/odixprintlab/"
  to     = "/odixprintlab/index.html"
  status = 200

# Admin
[[redirects]]
  from   = "/admin"
  to     = "/admin/index.html"
  status = 200

[[redirects]]
