[build]
  publish = "."

# ── Clean URL redirects ──────────────────────────────────────────
[[redirects]]
  from   = "/tools"
  to     = "/tools/index.html"
  status = 200

[[redirects]]
  from   = "/tools/skin-anchor"
  to     = "/tools/skin-anchor.html"
  status = 200

[[redirects]]
  from   = "/tools/parade-match"
  to     = "/tools/parade-match.html"
  status = 200

[[redirects]]
  from   = "/tools/halation"
  to     = "/tools/halation.html"
  status = 200

[[redirects]]
  from   = "/tools/zone-mapper"
  to     = "/tools/zone-mapper.html"
  status = 200

[[redirects]]
  from   = "/tools/bleach-bp"
  to     = "/tools/bleach-bp.html"
  status = 200

# ── Short download URLs ──────────────────────────────────────────
[[redirects]]
  from   = "/dctl/skin-anchor"
  to     = "/dctl/ODIX_SkinAnchor_v1.dctl"
  status = 200

[[redirects]]
  from   = "/dctl/parade-match"
  to     = "/dctl/ODIX_ParadeMatch_v1.dctl"
  status = 200

[[redirects]]
  from   = "/dctl/halation"
  to     = "/dctl/ODIX_Halation_v1.dctl"
  status = 200

[[redirects]]
  from   = "/dctl/zone-mapper"
  to     = "/dctl/ODIX_ZoneMapper_v1.dctl"
  status = 200

[[redirects]]
  from   = "/dctl/bleach-bp"
  to     = "/dctl/ODIX_BleachBP_v1.dctl"
  status = 200

# ── Security headers ─────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-XSS-Protection       = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# ── Force download for .dctl files ──────────────────────────────
[[headers]]
  for = "/dctl/*.dctl"
  [headers.values]
    Content-Disposition = "attachment"
    Content-Type        = "text/plain; charset=utf-8"
    Cache-Control       = "public, max-age=86400"

# ── Cache assets ─────────────────────────────────────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
